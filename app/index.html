<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Apply saved theme before first paint to prevent flash of wrong theme -->
    <script>
      ;(function () {
        try {
          var s = JSON.parse(localStorage.getItem('ernesty:settings') || '{}')
          document.documentElement.setAttribute('data-theme', s.theme || 'dark')
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
    <title>Earnesty — Your space for focused writing</title>
    <meta name="description" content="Earnesty is a clean, distraction-free writing app. Write, save, and revisit your work in a calm and focused environment.">

    <!-- Favicon -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32">
    <link rel="icon" href="/favicon.ico" sizes="48x48">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://write.liasis.dev">
    <meta property="og:title" content="Earnesty — Your space for focused writing">
    <meta property="og:description" content="Earnesty is a clean, distraction-free writing app. Write, save, and revisit your work in a calm and focused environment.">
    <meta property="og:image" content="https://write.liasis.dev/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:site_name" content="Earnesty">
    <meta property="og:locale" content="en_US">

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Earnesty — Your space for focused writing">
    <meta name="twitter:description" content="Earnesty is a clean, distraction-free writing app. Write, save, and revisit your work in a calm and focused environment.">
    <meta name="twitter:image" content="https://write.liasis.dev/og-image.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
