name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      location:
        description: Azure region
        default: swedencentral
      sku:
        description: Static Web App SKU
        default: Standard

# OIDC token needed for Azure federated credential login
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Bicep Stack
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Creates (or updates) a subscription-scoped deployment stack.
      # Using a deployment stack ensures resources are tracked and the deploy
      # is idempotent — re-running on the same release will update in place
      # rather than creating duplicate resources.
      - name: Deploy infrastructure
        run: |
          az stack sub create \
            --name "earnesty" \
            --location "${{ inputs.location || vars.AZURE_LOCATION || 'swedencentral' }}" \
            --template-file infra/main.bicep \
            --parameters \
              location="${{ inputs.location || vars.AZURE_LOCATION || 'swedencentral' }}" \
              staticWebAppSku="${{ inputs.sku || vars.STATIC_WEB_APP_SKU || 'Standard' }}" \
              entraClientId="${{ secrets.ENTRA_CLIENT_ID }}" \
              entraClientSecret="${{ secrets.ENTRA_CLIENT_SECRET }}" \
              entraTenantId="${{ secrets.ENTRA_TENANT_ID }}" \
              sanityToken="${{ secrets.SANITY_TOKEN }}" \
              sanityProjectId="${{ secrets.SANITY_PROJECT_ID }}" \
              sanityDataset="${{ secrets.SANITY_DATASET }}" \
            --deny-settings-mode none \
            --action-on-unmanage detachResources \
            --yes

