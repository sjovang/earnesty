repos:
  - repo: local
    hooks:
      - id: app-lint
        name: App ESLint
        language: system
        entry: bash -c 'cd app && npm run lint'
        pass_filenames: false
        files: ^app/.*\.(vue|ts|js)$

      - id: app-typecheck
        name: App Type Check
        language: system
        entry: bash -c 'cd app && npm run type-check'
        pass_filenames: false
        files: ^app/.*\.(vue|ts)$

      - id: api-test
        name: API Tests
        language: system
        entry: bash -c 'cd app/api && npm test'
        pass_filenames: false
        files: ^app/api/src/.*\.ts$

      - id: app-test
        name: Frontend Tests
        language: system
        entry: bash -c 'cd app && npm test'
        pass_filenames: false
        files: ^app/src/.*\.(ts|vue)$
